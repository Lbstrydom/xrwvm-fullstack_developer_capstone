apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-db
  labels:
    run: mongo-db
spec:
  replicas: 1
  selector:
    matchLabels:
      run: mongo-db
  template:
    metadata:
      labels:
        run: mongo-db
    spec:
      containers:
      - image: mongo:latest
        name: mongo-db
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-db
spec:
  selector:
    run: mongo-db
  ports:
  - port: 27017
    targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeapp
  labels:
    run: nodeapp
spec:
  replicas: 1
  selector:
    matchLabels:
      run: nodeapp
  template:
    metadata:
      labels:
        run: nodeapp
    spec:
      containers:
      - image: us.icr.io/sn-labs-strydomlouis/nodeapp:latest
        imagePullPolicy: Always
        name: nodeapp
        ports:
        - containerPort: 3030
        env:
        - name: MONGO_HOST
          value: "mongo-db"
---
apiVersion: v1
kind: Service
metadata:
  name: nodeapp-service
spec:
  selector:
    run: nodeapp
  ports:
  - port: 3030
    targetPort: 3030
